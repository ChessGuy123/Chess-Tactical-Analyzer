<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Analyzer</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #ffffff;
            margin: 0;
            padding: 30px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            width: 100%;
            max-width: 1400px;
        }

        .header h1 {
            font-size: 3.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #4a90e2 0%, #357abd 50%, #2968a8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent;
            letter-spacing: 3px;
            margin-bottom: 10px;
            text-transform: uppercase;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { filter: drop-shadow(0 0 20px rgba(74, 144, 226, 0.5)); }
            to { filter: drop-shadow(0 0 30px rgba(74, 144, 226, 0.8)); }
        }

        .header p {
            font-size: 1.2rem;
            color: #b8b8c8;
            margin: 0;
            font-weight: 400;
        }

        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
            max-width: 1400px;
        }

        .game-area {
            display: flex;
            align-items: flex-start;
            gap: 50px;
            width: 100%;
            justify-content: center;
            flex-wrap: nowrap;
            margin-top: 10px;
        }

        .eval-container {
            display: flex;
            align-items: flex-start;
            gap: 25px;
            margin-top: 140px;
        }

        .eval-bar-wrapper {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .eval-bar {
            width: 30px;
            height: 500px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            position: relative;
            overflow: hidden;
            border: 3px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
        }

        .eval-fill {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 50%;
            background: linear-gradient(180deg, #4a90e2 0%, #357abd 100%);
            transition: height 0.6s ease;
            border-radius: 0 0 15px 15px;
            box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.1);
        }

        .eval-labels {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 500px;
            font-size: 1rem;
            color: #4a90e2;
            font-weight: 700;
            text-shadow: 0 0 10px rgba(74, 144, 226, 0.5);
        }

        .board-container {
            background: linear-gradient(145deg, #1a1b23, #2a2b35);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.7);
            border: 3px solid rgba(255, 255, 255, 0.15);
            position: relative;
            overflow: hidden;
            margin-top: 0px;
        }

        .board-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, transparent 30%, rgba(74, 144, 226, 0.05) 50%, transparent 70%);
            pointer-events: none;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(8, 80px);
            grid-template-rows: repeat(8, 80px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 6px;
            background: transparent;
            position: relative;
            z-index: 1;
        }

        .square {
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 64px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(0, 0, 0, 0.3);
            position: relative;
        }

        .light {
            background: #f0d9b5 !important;
            box-shadow: inset 0 0 5px rgba(0, 0, 0, 0.2);
            color: #586b75;
        }

        .dark {
            background: #b58863 !important;
            box-shadow: inset 0 0 5px rgba(0, 0, 0, 0.4);
            color: #f0d9b5;
        }

        .square:hover {
            transform: scale(1.08);
            box-shadow: 0 8px 25px rgba(74, 144, 226, 0.4);
            z-index: 10;
        }

        .square.selected {
            background: rgba(74, 144, 226, 0.3) !important;
            box-shadow: inset 0 0 20px rgba(74, 144, 226, 0.6);
            transform: scale(1.05);
            z-index: 100;
        }

        .square.possible-move {
            background: rgba(76, 175, 80, 0.4) !important;
            box-shadow: inset 0 0 15px rgba(76, 175, 80, 0.6);
            position: relative;
        }

        .square.possible-move::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 12px;
            height: 12px;
            background: rgba(76, 175, 80, 0.8);
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(76, 175, 80, 0.8);
        }

        @keyframes pulse {
            0%, 100% { box-shadow: inset 0 0 15px rgba(74, 144, 226, 0.6); }
            50% { box-shadow: inset 0 0 25px rgba(74, 144, 226, 0.9); }
        }

        .piece {
            cursor: pointer;
            user-select: none;
            font-size: inherit;
            filter: drop-shadow(2px 2px 4px rgba(0, 0, 0, 0.3));
            transition: transform 0.2s ease;
            color: #000000;
            z-index: 10;
            position: relative;
        }

        .piece:hover {
            transform: scale(1.1);
        }

        .panel {
            background: linear-gradient(145deg, #1a1b23, #2a2b35);
            padding: 25px;
            border-radius: 20px;
            border: 3px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.7);
            width: 380px;
            position: relative;
            overflow: hidden;
            margin-top: 0px;
        }

        .panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(-45deg, transparent 30%, rgba(74, 144, 226, 0.03) 50%, transparent 70%);
            pointer-events: none;
        }

        .status-container {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 15px;
            position: relative;
            z-index: 1;
        }

        #status {
            display: block;
            font-size: 1.3rem;
            font-weight: 700;
            color: #4a90e2;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
            text-shadow: 0 0 15px rgba(74, 144, 226, 0.5);
        }

        #score {
            display: block;
            font-size: 2.8rem;
            font-weight: 800;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        #score.positive {
            color: #4a90e2;
            text-shadow: 0 0 25px rgba(74, 144, 226, 0.7);
        }

        #score.negative {
            color: #e74c3c;
            text-shadow: 0 0 25px rgba(231, 76, 60, 0.7);
        }

        #score.zero {
            color: #ffffff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .analysis-panel {
            margin-top: 30px;
            padding: 25px;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 15px;
            max-height: 350px;
            overflow-y: auto;
            position: relative;
            z-index: 1;
        }

        .analysis-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #4a90e2;
            margin-bottom: 20px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(74, 144, 226, 0.5);
        }

        .analysis-content {
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .move-comment {
            padding: 18px 22px;
            margin-bottom: 15px;
            background: linear-gradient(135deg, rgba(74, 144, 226, 0.15), rgba(53, 122, 189, 0.1));
            border-left: 5px solid #4a90e2;
            border-radius: 12px;
            font-size: 1rem;
            line-height: 1.6;
            animation: slideInRight 0.4s ease;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3), inset 0 0 15px rgba(74, 144, 226, 0.1);
            position: relative;
            overflow: hidden;
        }

        .move-comment::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 5px;
            height: 100%;
            background: linear-gradient(180deg, #4a90e2, #357abd);
            box-shadow: 0 0 15px rgba(74, 144, 226, 0.8);
        }

        .move-comment:hover {
            background: linear-gradient(135deg, rgba(74, 144, 226, 0.25), rgba(53, 122, 189, 0.15));
            transform: translateX(10px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4), inset 0 0 20px rgba(74, 144, 226, 0.2);
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
            position: relative;
            z-index: 1;
        }

        .controls button:first-child {
            grid-column: span 2;
        }

        button {
            background: linear-gradient(135deg, #4a90e2 0%, #357abd 50%, #2968a8 100%);
            color: #ffffff;
            border: none;
            padding: 18px 24px;
            border-radius: 15px;
            font-weight: 800;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            font-family: 'Inter', sans-serif;
            box-shadow: 0 8px 25px rgba(74, 144, 226, 0.4), inset 0 0 15px rgba(255, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
            white-space: nowrap;
            text-align: center;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.6s ease;
        }

        button:hover::before {
            left: 100%;
        }

        button:hover {
            background: linear-gradient(135deg, #5ba0f2 0%, #4580cd 50%, #3978b8 100%);
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(74, 144, 226, 0.6), inset 0 0 20px rgba(255, 255, 255, 0.3);
        }

        button:active {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(74, 144, 226, 0.4), inset 0 0 10px rgba(255, 255, 255, 0.2);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .info-text {
            font-size: 1.1rem;
            color: #b8b8c8;
            margin-top: 30px;
            text-align: center;
            line-height: 1.6;
            padding: 20px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 15px;
            border: 2px solid rgba(255, 255, 255, 0.15);
            position: relative;
            z-index: 1;
        }

        @media (max-width: 1200px) {
            .game-area {
                flex-direction: column;
                align-items: center;
                gap: 40px;
            }
            
            .eval-container {
                order: 2;
            }
            
            .board-container {
                order: 1;
            }
            
            .panel {
                order: 3;
                width: 100%;
                max-width: 500px;
            }
        }

        @media (max-width: 768px) {
            .board {
                grid-template-columns: repeat(8, 60px);
                grid-template-rows: repeat(8, 60px);
            }
            
            .square {
                width: 60px;
                height: 60px;
                font-size: 48px;
            }
            
            .eval-bar {
                height: 400px;
                width: 25px;
            }
            
            .eval-labels {
                height: 400px;
                font-size: 0.9rem;
            }
            
            .header h1 {
                font-size: 2.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>CHESS ANALYZER</h1>
        <p>Professional Chess Analysis Engine</p>
    </div>

    <div class="main-container">
        <div class="game-area">
            <div class="eval-container">
                <div class="eval-bar-wrapper">
                    <div class="eval-labels">
                        <span>+5.0</span>
                        <span>+2.5</span>
                        <span>0.0</span>
                        <span>-2.5</span>
                        <span>-5.0</span>
                    </div>
                    <div class="eval-bar">
                        <div id="eval-fill" class="eval-fill"></div>
                    </div>
                </div>
            </div>
            
            <div class="board-container">
                <div id="board" class="board"></div>
            </div>

            <div class="panel">
                <div class="status-container">
                    <div id="status">READY</div>
                    <div id="score" class="zero">0.0</div>
                </div>

                <div class="analysis-panel">
                    <div class="analysis-title">AI Analysis</div>
                    <div id="analysis-content" class="analysis-content">
                        <div class="move-comment">Welcome! Click pieces to move and see AI analysis.</div>
                    </div>
                </div>

                <div class="controls">
                    <button onclick="resetGame()">New Game</button>
                    <button onclick="undoMove()">Undo Move</button>
                    <button onclick="getHint()">Get Hint</button>
                    <button onclick="toggleGameMode()" id="modeButton">Play vs Engine</button>
                    <button onclick="showGameAccuracy()" id="accuracyButton">Game Accuracy</button>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Game variables
            let selected = null;
            let moveHistory = [];
            let gameMode = 'analysis';
            let playerColor = 'w';
            let isAnalyzing = false;
            let draggedPiece = null;
            let draggedFrom = null;

            // Test chess.js initialization
            function testChessJS() {
                try {
                    if (typeof Chess === 'undefined') {
                        console.error('Chess.js is not loaded!');
                        return false;
                    }
                    
                    game = new Chess();
                    console.log('Chess.js initialized successfully');
                    console.log('Starting position:', game.fen());
                    console.log('Available moves:', game.moves());
                    return true;
                } catch (error) {
                    console.error('Error initializing chess.js:', error);
                    return false;
                }
            }

            // Unicode chess pieces - globally accessible
            window.chessPieces = {
                'wp': '♙', 'wr': '♖', 'wn': '♘', 'wb': '♗', 'wq': '♕', 'wk': '♔',
                'bp': '♟', 'br': '♜', 'bn': '♞', 'bb': '♝', 'bq': '♛', 'bk': '♚'
            };

            // Test chess.js immediately
            if (!testChessJS()) {
                alert('Chess.js failed to load! Please refresh the page.');
            }

            // Simple test function
            function testBasicMove() {
                console.log('=== TESTING BASIC MOVE ===');
                try {
                    // Test basic pawn move
                    const testGame = new Chess();
                    console.log('Test game FEN:', testGame.fen());
                    console.log('Test game moves:', testGame.moves());
                    
                    const move = testGame.move('e4');
                    console.log('Test move result:', move);
                    console.log('After move FEN:', testGame.fen());
                    console.log('After move moves:', testGame.moves());
                    
                    if (move && move.san === 'e4') {
                        console.log('✅ Basic move test PASSED');
                        return true;
                    } else {
                        console.log('❌ Basic move test FAILED');
                        return false;
                    }
                } catch (error) {
                    console.error('❌ Test error:', error);
                    return false;
                }
            }

            // Run basic test
            if (!testBasicMove()) {
                console.error('Basic chess functionality is broken!');
            }

            // Initialize board immediately
            console.log('=== INITIALIZING BOARD ===');
            
            // Test board rendering
            setTimeout(() => {
                console.log('=== TESTING BOARD RENDER ===');
                const boardEl = document.getElementById('board');
                if (boardEl) {
                    console.log('Board element found:', boardEl);
                    console.log('Board innerHTML length:', boardEl.innerHTML.length);
                    console.log('Board classes:', boardEl.className);
                } else {
                    console.error('Board element NOT found!');
                }
            }, 1000);
            
            draw();
            
            // Test button functions
            setTimeout(() => {
                console.log('=== TESTING BUTTONS ===');
                console.log('resetGame function:', typeof window.resetGame);
                console.log('undoMove function:', typeof window.undoMove);
                console.log('getHint function:', typeof window.getHint);
                console.log('toggleGameMode function:', typeof window.toggleGameMode);
                console.log('showGameAccuracy function:', typeof window.showGameAccuracy);
            }, 1500);
            
            // Initialize engine with delay to ensure page load
            setTimeout(() => {
                initEngine();
            }, 100);
            
            // Make functions globally accessible
            window.resetGame = resetGame;
            window.undoMove = undoMove;
            window.getHint = getHint;
            window.toggleGameMode = toggleGameMode;
            window.showGameAccuracy = showGameAccuracy;

            function draw() {
                const board = game.board();
                const boardEl = document.getElementById('board');
                let html = '';
                
                console.log('Drawing board, current turn:', game.turn());
                console.log('Board state:', board);
                
                for (let row = 0; row < 8; row++) {
                    for (let col = 0; col < 8; col++) {
                        const square = String.fromCharCode(97 + col) + (8 - row);
                        const piece = board[row][col];
                        const isLight = (row + col) % 2 === 0;
                        
                        let classes = 'square';
                        if (isLight) classes += ' light';
                        else classes += ' dark';
                        
                        if (selected === square) classes += ' selected';
                        
                        html += `<div class="${classes}" data-square="${square}" onclick="handleSquareClick('${square}')" 
                                     ondragstart="handleDragStart(event)" ondragover="handleDragOver(event)" ondrop="handleDrop(event)">`;
                        
                        if (piece) {
                            const pieceKey = piece.color + piece.type;
                            const pieceSymbol = window.chessPieces[pieceKey];
                            console.log('Piece found:', piece, 'Key:', pieceKey, 'Symbol:', pieceSymbol);
                            
                            // Ensure piece symbol is displayed
                            if (pieceSymbol) {
                                html += `<span class="piece" draggable="true">${pieceSymbol}</span>`;
                            } else {
                                // Fallback to text representation
                                html += `<span class="piece" draggable="true">${piece.color}${piece.type}</span>`;
                            }
                        }
                        
                        html += '</div>';
                    }
                }
                
                console.log('Final HTML length:', html.length);
                boardEl.innerHTML = html;
                updateEvaluation();
            }

            function handleSquareClick(square) {
                console.log('Square clicked:', square);
                const piece = game.get(square);
                console.log('Piece on square:', piece, 'Current turn:', game.turn());
                
                // Alternative simplified movement logic
                try {
                    if (selected === null) {
                        // No piece selected - try to select
                        if (piece && piece.color === game.turn()) {
                            console.log('Selecting piece at:', square);
                            selected = square;
                            highlightSquare(square);
                        } else {
                            console.log('Cannot select piece - wrong color or no piece');
                        }
                    } else {
                        // Piece already selected - try to move
                        console.log('Trying to move from', selected, 'to', square);
                        
                        // Test if move is legal first
                        const testMove = {
                            from: selected,
                            to: square,
                            promotion: 'q'
                        };
                        
                        console.log('Test move:', testMove);
                        
                        // Check if move is in legal moves
                        const legalMoves = game.moves({verbose: true});
                        const isLegal = legalMoves.some(move => 
                            move.from === selected && move.to === square
                        );
                        
                        console.log('Legal moves:', legalMoves);
                        console.log('Is move legal?', isLegal);
                        
                        if (isLegal) {
                            const move = game.move(testMove);
                            console.log('Move result:', move);
                            
                            if (move) {
                                moveHistory.push(move);
                                selected = null;
                                clearHighlights();
                                draw();
                                
                                // Simple analysis for now (tactical analysis disabled)
                                addAnalysis(`Move: ${move.san}`);
                                
                                if (gameMode === 'play' && game.turn() === 'b') {
                                    statusEl.textContent = "ENGINE THINKING...";
                                    setTimeout(() => makeEngineMove(), 1000);
                                } else {
                                    statusEl.textContent = "YOUR TURN";
                                }
                            } else if (piece && piece.color === game.turn()) {
                                // Select new piece
                                selected = square;
                                highlightSquare(square);
                                draw();
                                updateStatus(`Selected ${square}`);
                            } else {
                                // Invalid move
                                selected = null;
                                draw();
                                updateStatus('Invalid move');
                            }
                        } else {
                            console.log('Move is not legal');
                            // Try selecting new piece if it's the right color
                            if (piece && piece.color === game.turn()) {
                                console.log('Selecting new piece at:', square);
                                selected = square;
                                highlightSquare(square);
                            } else {
                                console.log('Clearing selection');
                                selected = null;
                                clearHighlights();
                            }
                        }
                    }
                } catch (error) {
                    console.error('Error in handleSquareClick:', error);
                    selected = null;
                    clearHighlights();
                    draw();
                }
            }

            function highlightSquare(square) {
                // Clear previous highlights
                clearHighlights();
                
                // Highlight selected square
                const squareEl = document.querySelector(`[data-square="${square}"]`);
                if (squareEl) {
                    squareEl.classList.add('selected');
                }
                
                // Highlight possible moves
                const legalMoves = game.moves({verbose: true});
                legalMoves.forEach(move => {
                    if (move.from === square) {
                        const targetEl = document.querySelector(`[data-square="${move.to}"]`);
                        if (targetEl) {
                            targetEl.classList.add('possible-move');
                        }
                    }
                });
            }

            function clearHighlights() {
                document.querySelectorAll('.selected').forEach(el => {
                    el.classList.remove('selected');
                });
                document.querySelectorAll('.possible-move').forEach(el => {
                    el.classList.remove('possible-move');
                });
            }

            function formatMove(move) {
                return `${move.from}${move.to}`;
            }

            function addAnalysis(text, tacticalData = null) {
                const analysisContent = document.getElementById('analysis-content');
                const comment = document.createElement('div');
                comment.className = 'move-comment';
                
                if (tacticalData) {
                    // Enhanced tactical analysis
                    let tacticalHTML = `<strong>${text}</strong><br><br>`;
                    
                    // Add tactical motifs
                    if (tacticalData.motifs && tacticalData.motifs.length > 0) {

            function updateEvaluation() {
                if (engine && engineReady) {
                    // Use Stockfish for evaluation with proper UCI protocol
                    engine.postMessage('position fen ' + game.fen());
                    engine.postMessage('go depth 12');
                } else {
                    // Try opening book evaluation first
                    evaluateWithOpeningBook();
                }
            }

            function evaluateWithOpeningBook() {
                const fen = game.fen();
                const moves = game.moves();
                
                // Check if we're in opening phase (first few moves)
                if (moveHistory.length < 10) {
                    // Try to get opening evaluation from online source
                    getOpeningEvaluation(fen, moves);
                } else {
                    // Use Stockfish for middlegame/endgame
                    if (engine && engineReady) {
                        engine.postMessage('position fen ' + game.fen());
                        engine.postMessage('go depth 12');
                    } else {
                        // Fallback to advanced evaluator
                        const material = evaluateMaterial();
                        const score = material / 100;
                        console.log('Advanced evaluation score:', score);
                        if (!isNaN(score)) {
                            updateEvaluationDisplay(score);
                        }
                    }
                }
            }

            async function getOpeningEvaluation(fen, availableMoves) {
                try {
                    // Try multiple opening book sources
                    const openingSources = [
                        {
                            name: 'Lichess Opening Explorer',
                            url: `https://explorer.lichess.ovh/masters?fen=${encodeURIComponent(fen)}&moves=15&topGames=0&recentGames=0`,
                            parser: (data) => {
                                if (data.white && data.white.length > 0) {
                                    const topMove = data.white[0];
                                    return {
                                        evaluation: (topMove.white - topMove.black) * 100,
                                        bestMove: topMove.san || topMove.uci,
                                        confidence: topMove.white / (topMove.white + topMove.black) * 100
                                    };
                                }
                                return null;
                            }
                        },
                        {
                            name: 'ChessDB Opening API',
                            url: `https://www.chessdb.cn/api/v2/?fen=${encodeURIComponent(fen)}&moves=15`,
                            parser: (data) => {
                                if (data.chessdb && data.chessdb.analysis) {
                                    const analysis = data.chessdb.analysis;
                                    if (analysis.length > 0) {
                                        const topMove = analysis[0];
                                        return {
                                            evaluation: topMove.score || 0,
                                            bestMove: topMove.uci,
                                            confidence: topMove.frequency || 0
                                        };
                                    }
                                }
                                return null;
                            }
                        }
                    ];
                    
                    // Try each source until we get a result
                    for (const source of openingSources) {
                        try {
                            console.log(`Trying opening book: ${source.name}`);
                            const response = await fetch(source.url, {
                                method: 'GET',
                                headers: {
                                    'Accept': 'application/json',
                                    'User-Agent': 'Chess-Analyzer/1.0'
                                }
                            });
                            
                            if (response.ok) {
                                const data = await response.json();
                                const result = source.parser(data);
                                
                                if (result) {
                                    console.log('Opening book result:', result);
                                    updateEvaluationDisplay(result.evaluation / 100);
                                    
                                    if (result.bestMove && gameMode === 'play') {
                                        addAnalysis(`Opening book suggests: ${result.bestMove} (${result.confidence.toFixed(1)}% confidence)`);
                                    }
                                    
                                    return;
                                }
                            }
                        } catch (error) {
                            console.log(`Failed to fetch from ${source.name}:`, error);
                            continue;
                        }
                    }
                    
                    // Fallback to advanced evaluator if all sources fail
                    console.log('All opening sources failed, using advanced evaluator');
                    const material = evaluateMaterial();
                    const score = material / 100;
                    if (!isNaN(score)) {
                        updateEvaluationDisplay(score);
                    }
                    
                } catch (error) {
                    console.error('Opening book evaluation failed:', error);
                    // Fallback to material evaluation
                    const material = evaluateMaterial();
                    const score = material / 100;
                    if (!isNaN(score)) {
                        updateEvaluationDisplay(score);
                    }
                }
            }

            function updateEvaluationDisplay(score) {
                if (isNaN(score) || score === null || score === undefined) {
                    score = 0.0;
                }
                
                // Clamp score to reasonable range for display
                score = Math.max(-10, Math.min(10, score));
                
                scoreEl.textContent = score.toFixed(1);
                scoreEl.className = score > 0 ? 'positive' : score < 0 ? 'negative' : 'zero';
                
                // Update evaluation bar (50% = 0, 100% = +5, 0% = -5)
                const percentage = Math.max(0, Math.min(100, 50 + (score * 10)));
                fill.style.height = percentage + '%';
                
                console.log('Evaluation display:', score, 'Percentage:', percentage);
            }

            function evaluateMaterial() {
                const board = game.board();
                let material = 0;
                
                const pieceValues = {
                    'p': -1, 'n': -3, 'b': -3, 'r': -5, 'q': -9, 'k': 0,
                    'P': 1, 'N': 3, 'B': 3, 'R': 5, 'Q': 9, 'K': 0
                };
                
                for (let row = 0; row < 8; row++) {
                    for (let col = 0; col < 8; col++) {
                        const piece = board[row][col];
                        if (piece) {
                            material += pieceValues[piece.type] || 0;
                        }
                    }
                }
                
                return material * 100; // Convert to centipawns
            }

            function createAdvancedEvaluator() {
                console.log('Creating advanced position evaluator');
                updateEngineStatus(false);
                addAnalysis('Using advanced built-in position evaluator');
                
                // Advanced piece values and position tables
                const pieceValues = {

                };
                
                // Position tables for piece placement evaluation
                const pawnTable = [
                    [0,  0,  0,  0,  0,  0,  0,  0],
                    [50, 50, 50, 50, 50, 50, 50, 50],
                    [10, 10, 20, 30, 30, 20, 10, 10],

                    [5, 10, 10,-20,-20, 10, 10,  5],
                    [0,  0,  0,  0,  0,  0,  0,  0]
                ];
                
                const knightTable = [
                    [-50,-40,-30,-30,-30,-30,-40,-50],
                    [-40,-20,  0,  0,  0,  0,-20,-40],
                    [-30,  0, 10, 15, 15, 10,  0,-30],
                    [-30,  5, 15, 20, 20, 15,  5,-30],
                    [-30,  0, 15, 20, 20, 15,  0,-30],
                    [-30,  5, 10, 15, 15, 10,  5,-30],
                    [-40,-20,  0,  5,  5,  0,-20,-40],
                    [-50,-40,-30,-30,-30,-30,-40,-50]
                ];
                
                const bishopTable = [
                    [-20,-10,-10,-10,-10,-10,-10,-20],
                    [-10,  0,  0,  0,  0,  0,  0,-10],
                    [-10,  0,  5, 10, 10,  5,  0,-10],
                    [-10,  5,  5, 10, 10,  5,  5,-10],
                    [-10,  0, 10, 10, 10, 10,  0,-10],
                    [-10, 10, 10, 10, 10, 10, 10,-10],
                    [-10,  5,  0,  0,  0,  0,  5,-10],
                    [-20,-10,-10,-10,-10,-10,-10,-20]
                ];
                
                function evaluatePosition() {
                    const board = game.board();
                    let whiteScore = 0;
                    let blackScore = 0;
                    
                    // Piece values (in centipawns)
                    const pieceValues = { 
                        'p': 100, 'n': 320, 'b': 330, 'r': 500, 'q': 900, 'k': 0
                    };
                    
                    // Position tables for piece placement evaluation
                    const pawnTable = [
                        [0,  0,  0,  0,  0,  0,  0,  0],
                        [50, 50, 50, 50, 50, 50, 50, 50],
                        [10, 10, 20, 30, 30, 20, 10, 10],
                        [5,  5, 10, 25, 25, 10,  5,  5],
                        [0,  0,  0, 20, 20,  0,  0,  0],
                        [5, -5,-10,  0,  0,-10, -5,  5],
                        [5, 10, 10,-20,-20, 10, 10,  5],
                        [0,  0,  0,  0,  0,  0,  0,  0]
                    ];
                    
                    const knightTable = [
                        [-50,-40,-30,-30,-30,-30,-30,-40,-50],
                        [-40,-20,  0,  0,  0,  0,-20,-40],
                        [-30,  0, 10, 15, 15, 10,  0,-30],
                        [-30,  5, 15, 20, 20, 15,  5,-30],
                        [-30,  0, 15, 20, 20, 15,  0,-30],
                        [-30,  5, 10, 15, 15, 10,  5,-30],
                        [-40,-20,  0,  5,  5,  0,-20,-40],
                        [-50,-40,-30,-30,-30,-30,-30,-40,-50]
                    ];
                    
                    const bishopTable = [
                        [-20,-10,-10,-10,-10,-10,-10,-10,-20],
                        [-10,  0,  0,  0,  0,  0,  0,-10],
                        [-10,  0,  5, 10, 10,  5,  0,-10],
                        [-10,  5,  5, 10, 10,  5,  5,-10],
                        [-10,  0, 10, 10, 10, 10,  0,-10],
                        [-10, 10, 10, 10, 10, 10, 10,-10],
                        [-10,  5,  0,  0,  0,  0,  5,-10],
                        [-20,-10,-10,-10,-10,-10,-10,-10,-20]
                    ];
                    
                    for (let row = 0; row < 8; row++) {
                        for (let col = 0; col < 8; col++) {
                            const piece = board[row][col];
                            if (!piece) continue;
                            
                            const pieceValue = pieceValues[piece.type];
                            let positionBonus = 0;
                            
                            // Get position bonus based on piece type
                            const tableRow = piece.color === 'w' ? 7 - row : row;
                            const tableCol = piece.color === 'w' ? col : 7 - col;
                            
                            switch (piece.type) {
                                case 'p':
                                    positionBonus = pawnTable[tableRow][tableCol];
                                    break;
                                case 'n':
                                    positionBonus = knightTable[tableRow][tableCol];
                                    break;
                                case 'b':
                                    positionBonus = bishopTable[tableRow][tableCol];
                                    break;
                            }
                            
                            const totalValue = pieceValue + positionBonus;
                            
                            if (piece.color === 'w') {
                                whiteScore += totalValue;
                            } else {
                                blackScore += totalValue;
                            }
                        }
                    }
                    
                    // Enhanced mobility bonus
                    const moves = game.moves();
                    const mobilityBonus = moves.length * 5;
                    
                    if (game.turn() === 'w') {
                        whiteScore += mobilityBonus;
                    } else {
                        blackScore += mobilityBonus;
                    }
                    
                    // Center control bonus
                    const centerSquares = ['d4', 'e4', 'd5', 'e5'];
                    for (const square of centerSquares) {
                        const piece = game.get(square);
                        if (piece) {
                            if (piece.color === 'w') {
                                whiteScore += 20;
                            } else {
                                blackScore += 20;
                            }
                        }
                    }
                    
                    // King safety bonus
                    const whiteKing = game.get('e1');
                    const blackKing = game.get('e8');
                    if (whiteKing && whiteKing.color === 'w') {
                        whiteScore += 50;
                    }
                    if (blackKing && blackKing.color === 'b') {
                        blackScore += 50;
                    }
                    
                    // Return evaluation from White's perspective
                    return whiteScore - blackScore;
                }
                
                function findBestMove() {
                    const moves = game.moves({ verbose: true });
                    if (moves.length === 0) return null;
                    
                    let bestMove = null;
                    let bestScore = -Infinity;
                    
                    for (const move of moves) {
                        // Prioritize captures
                        let captureBonus = 0;
                        if (move.captured) {
                            captureBonus = pieceValues[move.captured] * 2;
                        }
                        
                        // Make the move
                        const tempMove = game.move(move);
                        if (!tempMove) continue;
                        
                        // Evaluate the position
                        const score = -evaluatePosition(); // Negative because it's opponent's turn
                        
                        // Add tactical bonuses
                        const totalScore = score + captureBonus;
                        
                        // Add small randomness for variety
                        const randomBonus = Math.random() * 10 - 5;
                        const finalScore = totalScore + randomBonus;
                        
                        if (finalScore > bestScore) {
                            bestScore = finalScore;
                            bestMove = move;
                        }
                        
                        // Undo the move
                        game.undo();
                    }
                    
                    return bestMove;
                }
                
                engine = {
                    postMessage: function(command) {
                        console.log('Advanced evaluator command:', command);
                        
                        if (command.includes('go depth')) {
                            setTimeout(() => {
                                const score = evaluatePosition();
                                const scoreInCentipawns = Math.round(score);
                                
                                handleEngineMessage({ 
                                    data: `score cp ${scoreInCentipawns}` 
                                });
                            }, 200);
                        } else if (command.includes('position fen')) {
                            // Position command - just store FEN
                            console.log('Position set:', command);
                        } else if (command.includes('stop')) {
                            console.log('Analysis stopped');
                        }
                    },
                    onmessage: null
                };
                
                engineReady = true;
                updateEngineStatus(true);
            }

            function updateEngineStatus(ready) {
                engineReady = ready;
                if (ready) {
                    statusEl.textContent = 'READY';
                } else {
                    statusEl.textContent = 'ENGINE ERROR';
                }
            }

            function handleEngineMessage(e) {
                const message = e.data;
                console.log('Engine message:', message);
                
                // Handle UCI identification
                if (message.includes('id name')) {
                    const engineName = message.replace('id name ', '');
                    addAnalysis(`Engine: ${engineName}`);
                    return;
                }
                
                // Handle engine ready
                if (message.includes('readyok')) {
                    engineReady = true;
                    updateEngineStatus(true);
                    addAnalysis('Stockfish engine is ready!');
                    
                    // Set engine options for stronger play
                    engine.postMessage('setoption name Skill Level value 20');
                    engine.postMessage('setoption name Contempt value 24');
                    engine.postMessage('setoption name Threads value 4');
                    engine.postMessage('setoption name Hash value 256');
                    
                    return;
                }
                
                // Handle bestmove
                if (message.includes('bestmove')) {
                    const moveMatch = message.match(/bestmove (\w{4})/);
                    if (moveMatch && gameMode === 'play') {
                        const move = moveMatch[1];
                        const moveObj = {
                            from: move.substring(0, 2),
                            to: move.substring(2, 4),
                            promotion: 'q'
                        };
                        
                        const legalMove = game.move(moveObj);
                        if (legalMove) {
                            moveHistory.push(legalMove);
                            draw();
                            addAnalysis(`Engine plays: ${legalMove.san || formatMove(moveObj)}`);
                            statusEl.textContent = "YOUR TURN";
                        }
                    }
                } else if (message.includes('score cp')) {
                    // Handle Stockfish evaluation in centipawns
                    const evalMatch = message.match(/score cp (-?\d+)/);
                    if (evalMatch) {
                        const score = parseInt(evalMatch[1]) / 100; // Convert to pawns
                        // Stockfish score: positive = White advantage, negative = Black advantage
                        updateEvaluationDisplay(score);
                    }
                } else if (message.includes('score mate')) {
                    // Handle mate evaluation
                    const mateMatch = message.match(/score mate (-?\d+)/);
                    if (mateMatch) {
                        const mateIn = parseInt(mateMatch[1]);
                        const score = mateIn > 0 ? 10 : -10; // Large positive/negative score for mate
                        updateEvaluationDisplay(score);
                        addAnalysis(`Mate in ${Math.abs(mateIn)} moves!`);
                    }
                }
            }

            function makeEngineMove() {
                if (!engine || !engineReady) {
                    // Simple random move as fallback
                    const moves = game.moves();
                    if (moves.length > 0) {
                        const randomMove = moves[Math.floor(Math.random() * moves.length)];
                        const legalMove = game.move(randomMove);
                        if (legalMove) {
                            moveHistory.push(legalMove);
                            draw();
                            addAnalysis(`Engine plays: ${legalMove.san || randomMove}`);
                            statusEl.textContent = "YOUR TURN";
                        }
                    }
                    return;
                }
                
                engine.postMessage('position fen ' + game.fen());
                engine.postMessage('go depth 12');
            }

            function undoMove() {
                if (moveHistory.length >= 2) {
                    game.undo(); // Undo engine move
                    game.undo(); // Undo player move
                    moveHistory.pop();
                    moveHistory.pop();
                    selected = null;
                    draggedPiece = null;
                    draggedFrom = null;
                    isAnalyzing = false;
                    draw();
                    statusEl.textContent = "YOUR TURN";
                    addAnalysis('Moves undone');

                    addAnalysis('Cannot undo - not enough moves');
                }

            function getHint() {
                if (engine && engineReady) {
                    statusEl.textContent = "ANALYZING...";
                    addAnalysis('Calculating best move...');
                    engine.postMessage('position fen ' + game.fen());
                    engine.postMessage('go depth 15');
                } else {
                    // Simple hint based on material
                    const moves = game.moves({ verbose: true });
                    if (moves.length > 0) {
                        const captures = moves.filter(m => m.flags.includes('c'));
                        const checks = moves.filter(m => m.flags.includes('n') || game.in_check());
                        
                        let hint = 'Consider: ';
                        if (checks.length > 0) {
                            hint += checks[0].san;
                        } else if (captures.length > 0) {
                            hint += captures[0].san;
                        } else {
                            hint += moves[0].san;
                        }
                        
                        addAnalysis(hint);
                    }
                }
            }

                    if (piece && piece.color === game.turn()) {
                        draggedPiece = piece;
                        draggedFrom = square;

                        e.dataTransfer.effectAllowed = 'move';
                        console.log('Drag started from:', square, 'Piece:', piece);

                        e.preventDefault();
                    }
                } catch (error) {
                    console.error('Error in handleDragStart:', error);
                    e.preventDefault();
                }
            }

            function handleDragOver(e) {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
            }

            function handleDrop(e) {
                e.preventDefault();
                try {
                    const targetSquare = e.currentTarget.dataset.square;
                    console.log('Drop attempted to:', targetSquare, 'From:', draggedFrom);
                    
                    if (draggedFrom && targetSquare !== draggedFrom) {
                        const move = {
                            from: draggedFrom,
                            to: targetSquare,
                            promotion: 'q'
                        };
                        
                        const legalMove = game.move(move);
                        if (legalMove) {
                            moveHistory.push(legalMove);
                            selected = null;
                            draggedPiece = null;
                            draggedFrom = null;
                            draw();
                            addAnalysis(`Move: ${legalMove.san || formatMove(move)}`);
                            
                            if (gameMode === 'play' && game.turn() === 'b') {
                                statusEl.textContent = "ENGINE THINKING...";
                                setTimeout(() => makeEngineMove(), 1000);
                            } else {
                                statusEl.textContent = "YOUR TURN";
                            }
                        } else {
                            addAnalysis('Invalid move');
                            selected = null;
                            draw();
                        }
                    }
                } catch (error) {
                    console.error('Error in handleDrop:', error);
                    addAnalysis('Error making move');
                }
            }

            // Advanced analysis functions
            function analyzePosition() {
                const board = game.board();
                let analysis = {
                    material: 0,
                    pieceCount: 0,
                    centerControl: 0,
                    kingSafety: 0
                };
                
                // Count material and pieces
                for (let row = 0; row < 8; row++) {
                    for (let col = 0; col < 8; col++) {
                        const piece = board[row][col];
                        if (piece) {
                            analysis.pieceCount++;
                            
                            // Material value
                            const values = { 'p': 1, 'n': 3, 'b': 3, 'r': 5, 'q': 9 };
                            analysis.material += values[piece.type] * (piece.color === 'w' ? 1 : -1);
                            
                            // Center control
                            if ((col >= 3 && col <= 4) && (row >= 3 && row <= 4)) {
                                analysis.centerControl += piece.color === 'w' ? 1 : -1;
                            }
                        }
                    }
                }
                
                return analysis;
            }

            function generateAICommentary(move, evaluation, bestMoveEval) {
                const moveQuality = bestMoveEval - evaluation;
                
                let commentary = '';
                
                // Move quality assessment
                if (moveQuality > 100) {
                    commentary = '🔴 Blunder! This move loses significant advantage.';
                } else if (moveQuality > 50) {
                    commentary = '🟡 Mistake. This move gives away some advantage.';
                } else if (moveQuality > 25) {
                    commentary = '🟠 Inaccuracy. Not the best move, but still playable.';
                } else if (moveQuality > -25) {
                    commentary = '🟢 Good move! This maintains the position.';
                } else if (moveQuality > -50) {
                    commentary = '🔵 Excellent move! This improves your position.';
                } else {
                    commentary = '⭐ Brilliant! This is a top-level move.';
                }
                
                return commentary;
            }

            // Keyboard shortcuts
            document.addEventListener('keydown', function(e) {
                switch(e.key) {
                    case 'Escape':
                        selected = null;
                        draw();
                        break;
                    case 'z':
                        if (e.ctrlKey || e.metaKey) {
                            e.preventDefault();
                            undoMove();
                        }
                        break;
                    case 'n':
                        if (e.ctrlKey || e.metaKey) {
                            e.preventDefault();
                            resetGame();
                        }
                        break;
                    case 'h':
                        getHint();
                        break;
                    case 'm':
                        toggleGameMode();
                        break;
                }
            });

            function showGameAccuracy() {
                const accuracy = calculateGameAccuracy();
                addAnalysis(`🎯 Game Accuracy: ${accuracy.overall}%`);
                addAnalysis(`📊 Best Moves: ${accuracy.bestMoves}/${accuracy.totalMoves}`);
                addAnalysis(`🔍 Blunders: ${accuracy.blunders} | Mistakes: ${accuracy.mistakes} | Inaccuracies: ${accuracy.inaccuracies}`);
                addAnalysis(`⚡ Average Centipawn Loss: ${accuracy.avgLoss.toFixed(1)}`);
            }

            function calculateGameAccuracy() {
                let bestMoves = 0;
                let blunders = 0;
                let mistakes = 0;
                let inaccuracies = 0;
                let totalLoss = 0;
                const totalMoves = moveHistory.length;

                if (totalMoves === 0) {
                    return {
                        overall: 100,
                        bestMoves: 0,
                        totalMoves: 0,
                        blunders: 0,
                        mistakes: 0,
                        inaccuracies: 0,
                        avgLoss: 0
                    };
                }

                // Analyze each move for accuracy
                for (let i = 0; i < totalMoves; i++) {
                    const move = moveHistory[i];
                    if (!move) continue;

                    // Get engine evaluation for this position
                    const tempGame = new Chess();
                    tempGame.load(moveHistory.slice(0, i).map(m => m.san || m).join(' '));
                    
                    // Simple evaluation based on material and position
                    const beforeEval = evaluatePositionSimple(tempGame);
                    
                    // Make the move
                    tempGame.move(move.san || move);
                    const afterEval = evaluatePositionSimple(tempGame);
                    
                    // Calculate evaluation change
                    const evalChange = afterEval - beforeEval;
                    totalLoss += Math.abs(evalChange);

                    // Classify move quality
                    if (Math.abs(evalChange) < 50) {
                        bestMoves++;
                    } else if (Math.abs(evalChange) < 150) {
                        inaccuracies++;
                    } else if (Math.abs(evalChange) < 300) {
                        mistakes++;
                    } else {
                        blunders++;
                    }
                }

                const overallAccuracy = totalMoves > 0 ? (bestMoves / totalMoves * 100) : 100;
                const avgLoss = totalMoves > 0 ? totalLoss / totalMoves : 0;

                return {
                    overall: overallAccuracy.toFixed(1),
                    bestMoves,
                    totalMoves,
                    blunders,
                    mistakes,
                    inaccuracies,
                    avgLoss
                };
            }

            function evaluatePositionSimple(game) {
                const board = game.board();
                let material = 0;
                
                const pieceValues = {
                    'p': 100, 'n': 320, 'b': 330, 'r': 500, 'q': 900, 'k': 0
                };
                
                for (let row = 0; row < 8; row++) {
                    for (let col = 0; col < 8; col++) {
                        const piece = board[row][col];
                        if (piece) {
                            material += pieceValues[piece.type] * (piece.color === 'w' ? 1 : -1);
                        }
                    }
                }
                
                return material;
            }

            function resetGame() {
                try {
                    console.log('Resetting game');
                    game.reset();
                    moveHistory = [];
                    selected = null;
                    draggedPiece = null;
                    draggedFrom = null;
                    analyzingMove = null;
                    isAnalyzing = false;
                    draw();
                    statusEl.textContent = gameMode === 'play' ? 'YOUR TURN' : 'READY';
                    scoreEl.textContent = '0.0';
                    fill.style.height = '50%';
                    
                    const welcomeMessage = gameMode === 'play' ? 
                        'New game started! You play as White vs Engine.' : 
                        'New game started! Analysis mode active.';
                    
                    analysisContent.innerHTML = `<div class="move-comment">${welcomeMessage}</div>`;
                    evaluatePosition();
                    
                    console.log('Game reset complete');
                } catch (error) {
                    console.error('Error in resetGame:', error);
                    addAnalysis('Error resetting game: ' + error.message);
                }
            }

            function undoMove() {
                try {
                    console.log('Undoing move');
                    if (game.undo()) {
                        moveHistory.pop();
                        selected = null;
                        draw();
                        updateStatus('Move undone');
                        addAnalysis('Move undone');
                        updateEvaluation();
                    } else {
                        updateStatus('No moves to undo');
                    }
                } catch (error) {
                    console.error('Error in undoMove:', error);
                    addAnalysis('Error undoing move: ' + error.message);
                }
            }

            function getHint() {
                try {
                    console.log('Getting hint');
                    if (engine && engineReady) {
                        statusEl.textContent = "ANALYZING...";
                        addAnalysis('Calculating best move...');
                        engine.postMessage('position fen ' + game.fen());
                        engine.postMessage('go depth 15');
                    } else {
                        // Simple hint based on material
                        const moves = game.moves({ verbose: true });
                        if (moves.length > 0) {
                            const captures = moves.filter(m => m.flags.includes('c'));
                            const checks = moves.filter(m => m.flags.includes('n') || game.in_check());
                            
                            let hint = 'Consider: ';
                            if (checks.length > 0) {
                                hint += checks[0].san;
                            } else if (captures.length > 0) {
                                hint += captures[0].san;
                            } else {
                                hint += moves[0].san;
                            }
                            
                            addAnalysis(hint);
                        }
                    }
                } catch (error) {
                    console.error('Error in getHint:', error);
                    addAnalysis('Error getting hint: ' + error.message);
                }
            }

            function toggleGameMode() {
                try {
                    console.log('Toggling game mode');
                    if (gameMode === 'analysis') {
                        gameMode = 'play';
                        document.getElementById('modeButton').textContent = 'Analysis Mode';
                        addAnalysis('Switched to Play vs Engine mode');
                    } else {
                        gameMode = 'analysis';
                        document.getElementById('modeButton').textContent = 'Play vs Engine';
                        addAnalysis('Switched to Analysis mode');
                    }
                    resetGame();
                } catch (error) {
                    console.error('Error in toggleGameMode:', error);
                    addAnalysis('Error toggling game mode: ' + error.message);
                }
            }

            function showGameAccuracy() {
                try {
                    console.log('Calculating game accuracy');
                    const accuracy = calculateGameAccuracy();
                    
                    const accuracyHTML = `
                        <div style="background: rgba(74, 144, 226, 0.1); padding: 15px; border-radius: 8px; margin-top: 10px;">
                            <h3 style="color: #4a90e2; margin-bottom: 10px;">🎯 Game Accuracy</h3>
                            <div style="font-size: 1.2rem; font-weight: bold; color: #00ff88; margin-bottom: 10px;">
                                Overall Accuracy: ${accuracy.overall}%
                            </div>
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px;">
                                <div>
                                    <strong>Best Moves:</strong> ${accuracy.bestMoves}/${accuracy.totalMoves}
                                </div>
                                <div>
                                    <strong>Blunders:</strong> ${accuracy.blunders}
                                </div>
                                <div>
                                    <strong>Mistakes:</strong> ${accuracy.mistakes}
                                </div>
                                <div>
                                    <strong>Inaccuracies:</strong> ${accuracy.inaccuracies}
                                </div>
                            </div>
                            <div style="margin-top: 10px; font-size: 0.9rem;">
                                Average Centipawn Loss: ${accuracy.avgLoss.toFixed(1)}
                            </div>
                        </div>
                    `;
                    
                    addAnalysis('Game Accuracy Analysis', {
                        motifs: ['analysis'],
                        evaluation: { assessment: 'Game completed', confidence: 'High' },
                        recommendations: accuracy.overall > 90 ? ['excellent_play'] : accuracy.overall > 70 ? ['good_play'] : ['practice_needed'],
                        threats: [],
                        opportunities: [`Accuracy: ${accuracy.overall}%`]
                    });
                    
                    // Add detailed accuracy display
                    const analysisContent = document.getElementById('analysis-content');
                    const accuracyDiv = document.createElement('div');
                    accuracyDiv.innerHTML = accuracyHTML;
                    analysisContent.appendChild(accuracyDiv);
                    
                } catch (error) {
                    console.error('Error in showGameAccuracy:', error);
                    addAnalysis('Error calculating accuracy: ' + error.message);
                }
            }

            // Initial setup
            updateEvaluation();
            addAnalysis('Welcome to Chess Analyzer!');
        });
    </script>
</body>
